<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="64" height="64" rx="12" fill="url(#sky)"/>
  <!-- Stars -->
  <circle cx="10" cy="10" r="1.2" fill="#e2e8f0"/>
  <circle cx="52" cy="8" r="1" fill="#e2e8f0"/>
  <circle cx="48" cy="22" r="0.8" fill="#e2e8f0"/>
  <circle cx="8" cy="28" r="0.7" fill="#e2e8f0"/>
  <circle cx="56" cy="38" r="0.9" fill="#e2e8f0"/>
  <!-- Telescope tube -->
  <g transform="translate(32,32)">
    <!-- Main tube angled up-right -->
    <rect x="-18" y="-5" width="30" height="10" rx="2" fill="#818cf8" transform="rotate(-35)"/>
    <!-- Lens hood -->
    <rect x="10" y="-7" width="5" height="14" rx="1.5" fill="#6366f1" transform="rotate(-35)"/>
    <!-- Eyepiece -->
    <rect x="-22" y="-3" width="6" height="6" rx="1" fill="#a5b4fc" transform="rotate(-35)"/>
    <!-- Tripod legs -->
    <line x1="0" y1="4" x2="-12" y2="22" stroke="#94a3b8" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="0" y1="4" x2="12" y2="22" stroke="#94a3b8" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="0" y1="4" x2="0" y2="23" stroke="#94a3b8" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Mount point -->
    <circle cx="0" cy="4" r="3" fill="#475569"/>
  </g>
</svg>
